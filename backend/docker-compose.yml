services:
  postgres:
    image: postgres:16-alpine
    container_name: healthtrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthtrack
      POSTGRES_USER: healthtrack
      POSTGRES_PASSWORD: healthtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthtrack -d healthtrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: healthtrack-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthtrack-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npm run dev"
    environment:
      DATABASE_URL: "postgresql://healthtrack:healthtrack@postgres:5432/healthtrack?schema=public"
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  ai-worker:
    build:
      context: ../IA
      dockerfile: Dockerfile
    container_name: healthtrack-ai-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../IA:/app
    environment:
      RABBITMQ_URL: "amqp://rabbitmq:5672"
      RABBITMQ_HEALTH_QUEUE: "health_data_queue"
      BACKEND_AI_WEBHOOK_URL: "http://backend:3000/api/webhooks/ai-results"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  backend_node_modules:
